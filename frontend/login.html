<!DOCTYPE html>

<html>

<head>

    <title>Login - CHEAT CODE</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .box {
            background: #1e293b;
            padding: 40px;
            border-radius: 18px;
            width: 380px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.6);
        }

        .logo {
            text-align: center;
            font-size: 55px;
            margin-bottom: 10px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #60a5fa;
        }

        h2 {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            background: #0f172a;
            color: white;
            outline: none;
        }

        input:focus {
            border: 2px solid #2563eb;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        button:hover {
            background: #1d4ed8;
            transform: scale(1.02);
        }

        .switch {
            margin-top: 18px;
            text-align: center;
            color: #60a5fa;
            cursor: pointer;
        }

        .switch:hover {
            text-decoration: underline;
        }

        .welcome {
            text-align: center;
            margin-bottom: 20px;
            color: #94a3b8;
            font-size: 14px;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            color: #64748b;
            font-size: 13px;
        }
    </style>

</head>

<body>

    <div class="box">

        <div class="logo">💻</div>

        <h1>&lt;CHEAT CODE&gt;</h1>

        <div class="welcome">
            Ultimate Coding Interview Platform
        </div>



        <!-- ========================= -->
        <!-- SIGNUP PAGE -->
        <!-- ========================= -->

        <div id="signupPage">

            <h2>Create Account</h2>

            <input id="signupUsername" placeholder="Enter Username">

            <input id="signupPassword" type="password" placeholder="Enter Password">

            <button onclick="signup()">
                Create Account
            </button>

            <div class="switch" onclick="showLogin()">
                Already have an account? Login
            </div>

        </div>



        <!-- ========================= -->
        <!-- LOGIN PAGE -->
        <!-- ========================= -->

        <div id="loginPage" style="display:none;">

            <h2>Login</h2>

            <input id="loginUsername" placeholder="Enter Username">

            <input id="loginPassword" type="password" placeholder="Enter Password">

            <button onclick="login()">
                Login
            </button>

            <div class="switch" onclick="showSignup()">
                Create new account
            </div>

        </div>



        <div class="footer">
            Built for SDE-1 System Design Practice
        </div>

    </div>





    <script>
        // ===============================
        // TOGGLE BETWEEN SIGNUP AND LOGIN
        // ===============================

        function showSignup() {
            document.getElementById("signupPage").style.display = "block";
            document.getElementById("loginPage").style.display = "none";
        }

        function showLogin() {
            document.getElementById("signupPage").style.display = "none";
            document.getElementById("loginPage").style.display = "block";
        }



        // ===============================
        // SIGNUP FUNCTION
        // ===============================

        async function signup(){

            const username =
                document.getElementById(
                    "signupUsername"
                ).value;

            const password =
                document.getElementById(
                    "signupPassword"
                ).value;



            // VALIDATION

            if(username === "" || password === ""){

                alert(
                    "Please fill all fields"
                );

                return;
            }

            if(password.length < 4){

                alert(
                    "Password must be at least 4 characters"
                );

                return;
            }



            try{

                const response = await fetch(
                    "http://localhost:8000/signup",
                    {
                        method:"POST",

                        headers:{
                            "Content-Type":"application/json"
                        },

                        body:JSON.stringify({
                            username,
                            password
                        })
                    }
                );



                const data =
                    await response.json();



                console.log(data);



                // SUCCESS

                if(response.ok){

                    alert(
                        "Account Created Successfully! Now Login"
                    );

                    // SWITCH TO LOGIN PAGE
                    showLogin();

                    // CLEAR FORM
                    document.getElementById(
                        "signupUsername"
                    ).value = "";

                    document.getElementById(
                        "signupPassword"
                    ).value = "";
                }

                else{

                    alert(
                        data.detail
                    );
                }

            }

            catch(error){

                console.log(error);

                alert(
                    "Backend connection failed"
                );
            }
        }



        // ===============================
        // LOGIN FUNCTION
        // ===============================

        async function login(){

            const username =
                document.getElementById(
                    "loginUsername"
                ).value;

            const password =
                document.getElementById(
                    "loginPassword"
                ).value;



            // VALIDATION

            if(username === "" || password === ""){

                alert(
                    "Please fill all fields"
                );

                return;
            }



            try{

                const response = await fetch(
                    "http://localhost:8000/login",
                    {
                        method:"POST",

                        headers:{
                            "Content-Type":"application/json"
                        },

                        body:JSON.stringify({
                            username,
                            password
                        })
                    }
                );



                const data =
                    await response.json();



                console.log(data);



                // SUCCESS

                if(response.ok){

                    localStorage.setItem(
                        "user",
                        data.username
                    );



                    alert(
                        "Login Successful"
                    );



                    // REDIRECT TO QUESTIONS PAGE

                    window.location.replace(
                        "http://localhost:3000/index.html"
                    );
                }

                else{

                    alert(
                        data.detail
                    );
                }

            }

            catch(error){

                console.log(error);

                alert(
                    "Backend connection failed"
                );
            }
        }
    </script>

</body>

</html>
