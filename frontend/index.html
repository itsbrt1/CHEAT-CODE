<!DOCTYPE html>

<html>

<head>

    <title>Professional Online Judge</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .nav {
            background: #111827;
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
        }

        .container {
            display: flex;
            padding: 20px;
            gap: 20px;
        }

        .left {
            flex: 2;
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
        }

        .right {
            flex: 1;
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 320px;
            background: black;
            color: #22c55e;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
        }

        .problem {
            background: #0f172a;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
        }

        .solved {
            color: #22c55e;
        }

        .result {
            margin-top: 20px;
            background: #020617;
            padding: 15px;
            border-radius: 10px;
        }

        .problem {
            background: #0f172a;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #334155;
        }

        .problem:hover {
            background: #1d4ed8;
            transform: scale(1.02);
        }
    </style>

</head>

<body>

    <div class="nav">

        <button onclick="logout()" style="
        float:right;
        background:red;
        color:white;
        border:none;
        padding:10px;
        border-radius:8px;
        cursor:pointer;
    ">
            Logout
        </button>

        <img src="https://cdn-icons-png.flaticon.com/512/1005/1005141.png" width="40" style="
            vertical-align:middle;
            margin-right:10px;
        ">

        &lt;CHEAT CODE&gt;

    </div>

    <div class="container">

        <div class="left">

            <h2 id="title"></h2>

            <p id="description"></p>

            <textarea id="code"></textarea>

            <br>

            <button onclick="submitCode()">

                Submit Solution

            </button>

            <div id="result" class="result"></div>

        </div>

        <div class="right">

            <h2>Problems</h2>

            <div id="problemList"></div>

            <h2>Solved History</h2>

            <div id="history"></div>

        </div>

    </div>

    <script>



        function logout() {

            localStorage.removeItem("user");

            window.location.href =
                "login.html";
        }

        const user =
            localStorage.getItem("user");



        if (!user) {

            window.location.replace(
                "http://localhost:3000/login.html"
            );
        }



        // ===============================
        // PROBLEM SYSTEM
        // ===============================

        let currentProblem = 1;

        let problems = [];



        // ===============================
        // LOAD PROBLEMS
        // ===============================

        async function loadProblems() {

            const response =
                await fetch(
                    "http://localhost:8000/problems"
                );

            problems = await response.json();

            renderProblems();

            loadProblem(currentProblem);
        }



        // ===============================
        // RENDER PROBLEMS SIDEBAR
        // ===============================

        function renderProblems() {

            let html = "";

            problems.forEach(p => {

                html += `
        <div
            class="problem"

            onclick="loadProblem(${p.id})"

            style="
                cursor:pointer;
                transition:0.3s;
            "

            onmouseover="
                this.style.background='#1d4ed8'
            "

            onmouseout="
                this.style.background='#0f172a'
            "
        >

            <strong>
                ${p.id}. ${p.title}
            </strong>

        </div>
        `;
            });

            document.getElementById(
                "problemList"
            ).innerHTML = html;
        }



        // ===============================
        // LOAD SINGLE PROBLEM
        // ===============================

        function loadProblem(id) {

            currentProblem = id;

            const p =
                problems.find(x => x.id === id);

            document.getElementById(
                "title"
            ).innerText = p.title;

            document.getElementById(
                "description"
            ).innerText = p.description;



            // Only add starter code first time

            if (
                document.getElementById(
                    "code"
                ).value === ""
            ) {

                document.getElementById(
                    "code"
                ).value = p.starter;
            }



            document.getElementById(
                "result"
            ).innerHTML = "";
        }



        // ===============================
        // SUBMIT CODE
        // ===============================

        async function submitCode() {

            const code =
                document.getElementById(
                    "code"
                ).value;

            const response = await fetch(
                "http://localhost:8000/submit",
                {
                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        code: code,
                        problem_id: currentProblem
                    })
                }
            );

            const data = await response.json();



            // ===========================
            // SUCCESS
            // ===========================

            if (data.status === "Solved") {

                document.getElementById(
                    "result"
                ).innerHTML =

                    "<h2 style='color:#22c55e'>Solved ✅</h2>";



                loadHistory();



                // =======================
                // NEXT PROBLEM
                // =======================

                if (data.next_problem) {

                    setTimeout(() => {

                        alert(
                            "Next Problem Unlocked!"
                        );

                        document.getElementById(
                            "code"
                        ).value = "";

                        loadProblem(
                            data.next_problem.id
                        );

                    }, 1000);
                }
            }



            // ===========================
            // WRONG ANSWER
            // ===========================

            else {

                document.getElementById(
                    "result"
                ).innerHTML =

                    "<h2 style='color:red'>Wrong Answer ❌</h2>" +

                    "<p>Expected:</p><pre>" +
                    data.expected +
                    "</pre>" +

                    "<p>Got:</p><pre>" +
                    data.got +
                    "</pre>";
            }
        }



        // ===============================
        // LOAD HISTORY
        // ===============================

        async function loadHistory() {

            const response =
                await fetch(
                    "http://localhost:8000/history"
                );

            const data =
                await response.json();

            let html = "";

            data.forEach(item => {

                html += `
        <div class="problem">

            <span class="solved">
                ${item.problem}
            </span>

            <br>

            <small>
                ${item.status}
            </small>

        </div>
        `;
            });

            document.getElementById(
                "history"
            ).innerHTML = html;
        }



        // ===============================
        // INITIAL LOAD
        // ===============================

        loadProblems();

        loadHistory();



    </script>

</body>

</html>
